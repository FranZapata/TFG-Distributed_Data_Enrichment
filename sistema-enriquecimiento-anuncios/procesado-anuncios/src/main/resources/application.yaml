server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tfgdb
    username: tfguser
    password: tfgpassword

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: procesado-anuncios-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.tfg.anuncios.contratos.evento.AnuncioSinProcesarEvent
        max.pol.interval.ms: 300000 # 5 min de espera antes de que kafka expulse el servicio por inactividad
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

ollama:
  url: http://localhost:11434/api/generate #Cambiar cuando dockericemos
  modelo: llama3:8b
  timeout: 120000
  maxIntentos: 2 #Intentos que hace el servicio antes de enviar anuncio al topic anuncio_fallo_llm
